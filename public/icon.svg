<div className="flex flex-col items-center gap-6">
  <svg 
    width={iconSize} 
    height={iconSize} 
    viewBox="40 40 40 40" 
    fill="none" 
    xmlns="http://www.w3.org/2000/svg"
  >
    <style>{`
      /* Color negro por defecto */
      .f-bar { fill: #000000; }

      /* Cambia a blanco si el sistema está en modo oscuro */
      @media (prefers-color-scheme: dark) {
        .f-bar { fill: #ffffff; }
      }
    `}</style>

    {/* Las tres barras de la "F" */}
    <rect className="f-bar" x="42" y="42" width="36" height="8" />
    <rect className="f-bar" x="42" y="57" width="28" height="7" />
    <rect className="f-bar" x="42" y="71" width="8" height="7" />
  </svg>
</div>
