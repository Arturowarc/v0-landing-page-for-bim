<div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '24px' }}>
  <svg 
    width={iconSize} 
    height={iconSize} 
    viewBox="40 40 40 40" 
    fill="none" 
    xmlns="http://www.w3.org/2000/svg"
  >
    <style>
      {
        /* Color por defecto (Modo Claro) */
        .barra-f { fill: black; }

        /* Color cuando el sistema está en Modo Oscuro */
        @media (prefers-color-scheme: dark) {
          .barra-f { fill: white; }
        }
      }
    </style>

    {/* Tres barras horizontales con la clase para el color dinámico */}
    <rect className="barra-f" x="42" y="42" width="36" height="8" />
    <rect className="barra-f" x="57" width="28" height="7" /> 
    {/* Nota: x="42" y="57" en el original, asegúrate de mantener tus coordenadas exactas */}
    <rect className="barra-f" x="42" y="57" width="28" height="7" />
    <rect className="barra-f" x="42" y="71" width="8" height="7" />
  </svg>
</div>

