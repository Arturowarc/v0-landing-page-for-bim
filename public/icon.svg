<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <style>
    /* Aplicamos el color al stroke del marco y al fill de las barras */
    rect { stroke: black; fill: black; }
    
    /* El marco cuadrado NO debe tener relleno, solo borde */
    .marco { fill: none !important; }

    @media (prefers-color-scheme: dark) {
      rect { stroke: white; fill: white; }
    }
  </style>

  {/* Marco cuadrado exterior */}
  <rect 
    className="marco" 
    x="30" y="30" 
    width="60" height="60" 
    strokeWidth="6" 
    fill="none" 
  />

  {/* Tres barras horizontales que sugieren F */}
  <rect x="42" y="42" width="36" height="8" />
  <rect x="42" y="57" width="28" height="7" />
  <rect x="42" y="71" width="8" height="7" />
</svg>
